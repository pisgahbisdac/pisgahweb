<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisgah Bisdac Church | CMS Backend</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Gaya sama seperti sebelumnya, tapi sederhana */
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefaf5; color: #2e2a28; }
        :root { --primary-green: #2c3e2f; --accent-gold: #c59b3c; }
        .container { max-width:1280px; margin:0 auto; padding:0 24px; }
        .btn { background: var(--primary-green); color:white; padding:10px 24px; border-radius:40px; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
        .hero { background: linear-gradient(135deg, #f8f2e7, #e9e0d3); border-radius: 0 0 48px 48px; padding: 2rem 0; }
        .card { background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .admin-toolbar { position: fixed; bottom:20px; right:20px; background:#1e2a1e; color:white; padding: 10px 18px; border-radius: 60px; display: flex; gap: 12px; z-index: 999; }
        .editable[contenteditable="true"] { background:#fff6e0; outline:1px dashed gold; border-radius: 6px; padding: 2px 4px; }
        .grid-3 { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); }
        .schedule-table { width:100%; border-collapse: collapse; background: white; border-radius: 24px; overflow: hidden; }
        .schedule-table th, .schedule-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; padding: 2rem; border-radius: 32px; width: 300px; text-align: center; }
        input { padding: 10px; margin: 8px 0; width: 100%; border-radius: 40px; border:1px solid #ccc; }
    </style>
</head>
<body>

<div id="loginModal" style="display:flex;" class="login-overlay">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 2rem; color:var(--accent-gold);"></i>
        <h3>Admin Login</h3>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn" class="btn" style="background:var(--primary-green); border:none;">Login</button>
    </div>
</div>

<div id="adminToolbar" style="display:none;" class="admin-toolbar">
    <button id="toggleEditBtn" style="background:gold; border:none; padding:6px 12px; border-radius: 40px;">Edit Mode</button>
    <button id="saveBtn" style="background:#4c9f70; border:none; padding:6px 12px;">Simpan</button>
    <button id="layoutBtn" style="background:#7d5d2e; border:none;">Layout</button>
    <button id="resetBtn" style="background:#b34e4e;">Reset</button>
    <button id="logoutBtn">Keluar</button>
</div>

<div id="pageContent" style="display:none;">
    <!-- Konten akan diisi oleh JavaScript dari API -->
</div>

<script>
    let token = null;
    let editMode = false;
    let currentContent = null;

    async function apiCall(url, method, body, needAuth = true) {
        const headers = { 'Content-Type': 'application/json' };
        if (needAuth && token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
        return res.json();
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await apiCall('/api/login', 'POST', { username, password }, false);
        if (res.success) {
            token = res.token;
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminToolbar').style.display = 'flex';
            loadContent();
            document.getElementById('pageContent').style.display = 'block';
        } else {
            alert('Login gagal');
        }
    }

    async function loadContent() {
        const res = await apiCall('/api/content', 'GET', null, false);
        if (res.success) {
            currentContent = res.content;
            renderPage(currentContent);
        }
    }

    function renderPage(content) {
        const container = document.getElementById('pageContent');
        // build HTML based on content data
        container.innerHTML = `
            <div class="hero">
                <div class="container">
                    <h1 class="editable-text" data-field="churchName">${content.churchName}</h1>
                    <p class="editable-text" data-field="tagline">${content.tagline}</p>
                    <div class="editable-text" data-field="verse">${content.verse}</div>
                    <div class="editable-text" data-field="promoText">${content.promoText}</div>
                </div>
            </div>
            <div class="container">
                <h2>Jadwal Ibadah</h2>
                <table class="schedule-table">
                    <thead><tr><th>Ibadah</th><th>Waktu</th><th>Lokasi</th></tr></thead>
                    <tbody id="scheduleBody">
                        ${content.schedule.map(row => `<tr><td class="editable-schedule">${row[0]}</td><td class="editable-schedule">${row[1]}</td><td class="editable-schedule">${row[2]}</td></tr>`).join('')}
                    </tbody>
                </table>
                <h2>Ministries</h2>
                <div class="grid-3" id="ministriesGrid">
                    ${content.ministries.map(m => `<div class="card"><i class="${m.icon}"></i><h3 class="editable-ministry-title">${m.title}</h3><p class="editable-ministry-desc">${m.desc}</p></div>`).join('')}
                </div>
                <h2>Tentang Kami</h2>
                <div class="grid-3" id="aboutGrid">
                    ${content.aboutCards.map(c => `<div class="card"><i class="${c.icon}"></i><h3 class="editable-about-title">${c.title}</h3><p class="editable-about-desc">${c.desc}</p></div>`).join('')}
                </div>
            </div>
        `;
        applyLayout(content.layout);
        if (editMode) enableEditing(true);
    }

    function applyLayout(layout) {
        const ministryGrid = document.getElementById('ministriesGrid');
        const aboutGrid = document.getElementById('aboutGrid');
        if (layout.ministryGrid) ministryGrid.style.gridTemplateColumns = `repeat(${layout.ministryGrid}, 1fr)`;
        if (layout.aboutGrid) aboutGrid.style.gridTemplateColumns = `repeat(${layout.aboutGrid}, 1fr)`;
        // theme
        const root = document.documentElement;
        if (layout.theme === 'green') { root.style.setProperty('--primary-green', '#2c3e2f'); root.style.setProperty('--accent-gold', '#c59b3c'); }
        else if (layout.theme === 'blue') { root.style.setProperty('--primary-green', '#1e4a6b'); root.style.setProperty('--accent-gold', '#9ab3d5'); }
        else if (layout.theme === 'burgundy') { root.style.setProperty('--primary-green', '#6b2e3e'); root.style.setProperty('--accent-gold', '#cfa87c'); }
    }

    function enableEditing(enable) {
        editMode = enable;
        document.querySelectorAll('.editable-text, .editable-schedule, .editable-ministry-title, .editable-ministry-desc, .editable-about-title, .editable-about-desc').forEach(el => {
            if (enable) el.setAttribute('contenteditable', 'true');
            else el.removeAttribute('contenteditable');
        });
    }

    async function saveAll() {
        // update churchName, tagline, dll
        const fields = ['churchName', 'tagline', 'verse', 'promoText'];
        for (let field of fields) {
            const el = document.querySelector(`[data-field="${field}"]`);
            if (el) {
                await apiCall('/api/update-content', 'POST', { field, value: el.innerHTML }, true);
            }
        }
        // update schedule
        const scheduleRows = [...document.querySelectorAll('#scheduleBody tr')].map(tr => [...tr.querySelectorAll('td')].map(td => td.innerText));
        await apiCall('/api/update-content', 'POST', { field: 'schedule', value: scheduleRows }, true);
        // update ministries
        const ministries = [...document.querySelectorAll('#ministriesGrid .card')].map(card => ({
            icon: card.querySelector('i').className,
            title: card.querySelector('.editable-ministry-title').innerText,
            desc: card.querySelector('.editable-ministry-desc').innerText
        }));
        await apiCall('/api/update-content', 'POST', { field: 'ministries', value: ministries }, true);
        // update aboutCards
        const aboutCards = [...document.querySelectorAll('#aboutGrid .card')].map(card => ({
            icon: card.querySelector('i').className,
            title: card.querySelector('.editable-about-title').innerText,
            desc: card.querySelector('.editable-about-desc').innerText
        }));
        await apiCall('/api/update-content', 'POST', { field: 'aboutCards', value: aboutCards }, true);
        alert('Semua perubahan tersimpan!');
    }

    async function resetToDefault() {
        if (confirm('Reset semua data ke default?')) {
            await apiCall('/api/reset', 'POST', {}, true);
            loadContent();
        }
    }

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('toggleEditBtn').onclick = () => enableEditing(!editMode);
    document.getElementById('saveBtn').onclick = saveAll;
    document.getElementById('resetBtn').onclick = resetToDefault;
    document.getElementById('logoutBtn').onclick = () => location.reload();
    document.getElementById('layoutBtn').onclick = () => {
        const newMinistry = prompt('Jumlah kolom Ministries (2/3/4):', currentContent.layout.ministryGrid);
        const newAbout = prompt('Jumlah kolom About (2/3):', currentContent.layout.aboutGrid);
        const theme = prompt('Tema (green/blue/burgundy):', currentContent.layout.theme);
        if (newMinistry && newAbout && theme) {
            apiCall('/api/update-layout', 'POST', { ministryGrid: newMinistry, aboutGrid: newAbout, theme }, true);
            loadContent();
        }
    };
</script>
</body>
</html>
