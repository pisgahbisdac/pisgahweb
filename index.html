<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisgah Bisdac Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefcf8; color: #2c2a27; }
        :root { --primary-green: #2c5f3a; --accent-gold: #c9a03d; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        h2 { font-size: 2rem; margin-bottom: 1.25rem; border-left: 6px solid var(--accent-gold); padding-left: 1rem; color: var(--primary-green); }
        .btn-primary { background: var(--primary-green); color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .btn-outline { background: transparent; border: 2px solid var(--primary-green); color: var(--primary-green); }
        .hero { background: linear-gradient(135deg, #f5efdf, #e5dac5); border-radius: 0 0 48px 48px; padding: 2.5rem 0 3rem; text-align: center; }
        .church-name { font-size: 3rem; font-weight: 900; background: linear-gradient(120deg, #2b5b38, #b87c2e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .verse { background: rgba(255,248,235,0.9); display: inline-block; padding: 0.6rem 1.8rem; border-radius: 60px; margin: 1rem 0; font-style: italic; }
        .quick-access { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0 0.5rem; }
        .quick-card { background: white; padding: 0.5rem 1.2rem; border-radius: 60px; font-weight: 600; text-decoration: none; color: var(--primary-green); }
        .promo-banner { background: #f2ebdd; border-radius: 60px; display: inline-block; padding: 0.4rem 1.5rem; margin-top: 1rem; }
        .schedule-wrapper { overflow-x: auto; background: white; border-radius: 32px; margin: 2rem 0; }
        .schedule-table { width: 100%; border-collapse: collapse; }
        .schedule-table th { background: var(--primary-green); color: white; padding: 1rem; }
        .schedule-table td { padding: 1rem; text-align: center; border-bottom: 1px solid #eedfcb; }
        .grid-2, .grid-3 { display: grid; gap: 2rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .card { background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #efe2d0; }
        .card i { font-size: 2rem; color: var(--accent-gold); margin-bottom: 1rem; }
        .youtube-card { background: #1f2c1c; color: white; border-radius: 32px; padding: 2rem; text-align: center; }
        .location-block { background: var(--primary-green); color: white; border-radius: 32px; padding: 1.5rem; }
        .testimony { background: #fef4e8; border-radius: 28px; padding: 1.5rem; }
        .admin-login-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary-green); color: white; padding: 10px 18px; border-radius: 40px; z-index: 999; cursor: pointer; }
        .admin-toolbar { position: fixed; bottom: 20px; right: 20px; background: #1e2a1c; padding: 10px 18px; border-radius: 60px; display: flex; gap: 12px; z-index: 999; }
        .admin-toolbar button { background: var(--accent-gold); border: none; padding: 6px 14px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .editable[contenteditable="true"] { background: #fff6e0; outline: 1px dashed var(--accent-gold); border-radius: 6px; padding: 2px 4px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: white; padding: 2rem; border-radius: 32px; width: 300px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; }
        @media (max-width: 768px) { .church-name { font-size: 2rem; } }
    </style>
</head>
<body>

<button id="adminLoginBtn" class="admin-login-btn"><i class="fas fa-lock"></i> Admin</button>
<div id="adminToolbar" style="display: none;" class="admin-toolbar">
    <button id="toggleEditBtn">Edit Mode</button>
    <button id="saveBtn">Simpan</button>
    <button id="logoutBtn">Logout</button>
</div>

<div id="pageContent"></div>
<footer class="footer" style="background: #1f2a1a; color: #ddd2bd; padding: 2rem; text-align: center;"><div class="container">&copy; 2025 Pisgah Bisdac Church</div></footer>

<script>
    // ========== GANTI DENGAN KREDENSIAL SUPABASE ANDA ==========
    const SUPABASE_URL = "https://qbbxgkzdljjlnjowffhm.supabase.co/rest/v1/";      // contoh: "https://abcdefg.supabase.co"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiYnhna3pkbGpqbG5qb3dmZmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNDU0OTcsImV4cCI6MjA5MzgyMTQ5N30.KMy3hQXNwiEYqpjRaZl9XJAFkmp2RqdbNflpPFCqi_o";
    // =========================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let editMode = false;
    let isAdmin = false;
    let currentData = null;

    // Login sederhana: PIN 123456 (bisa diubah)
    function promptLogin() {
        const pin = prompt("Masukkan PIN Admin:");
        if (pin === "123456") {
            isAdmin = true;
            document.getElementById("adminLoginBtn").style.display = "none";
            document.getElementById("adminToolbar").style.display = "flex";
            alert("Login berhasil! Klik Edit Mode untuk mengubah konten.");
        } else {
            alert("PIN salah!");
        }
    }

    // Ambil data dari Supabase
    async function loadContent() {
        const { data, error } = await supabase.from("site_content").select("data").eq("id", 1).single();
        if (error) {
            console.error(error);
            document.getElementById("pageContent").innerHTML = "<p>Gagal memuat data. Pastikan tabel sudah dibuat.</p>";
            return;
        }
        currentData = data.data;
        renderPage(currentData);
    }

    function renderPage(c) {
        document.getElementById("pageContent").innerHTML = `
            <div class="hero"><div class="container"><div class="hero-content">
                <h1 class="editable-text" data-field="churchName">${escapeHtml(c.churchName)}</h1>
                <div class="tagline editable-text" data-field="tagline">${escapeHtml(c.tagline)}</div>
                <div class="verse editable-text" data-field="verse">${c.verse}</div>
                <div class="quick-access">
                    <a href="#" class="quick-card"><i class="fas fa-praying-hands"></i> Doa & Pemohon</a>
                    <a href="#" class="quick-card"><i class="fas fa-cloud-upload-alt"></i> Pembubaran Online</a>
                    <a href="#" class="quick-card"><i class="fas fa-share-alt"></i> Berbagi</a>
                    <a href="#" class="quick-card"><i class="fas fa-envelope"></i> Hubungi</a>
                </div>
                <div class="promo-banner editable-text" data-field="promoText">${escapeHtml(c.promoText)}</div>
            </div></div></div>
            <div class="container">
                <h2>JADWAL IBADAH</h2>
                <div class="schedule-wrapper"><table class="schedule-table"><thead><tr>${c.schedule.map(() => "<th>Ibadah</th>").join('')}</tr></thead><tbody id="scheduleBody">${c.schedule.map(row => `<tr>${row.map(cell => `<td class="editable-schedule">${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
                <div class="grid-2">
                    <div class="youtube-card"><i class="fab fa-youtube"></i><h3>Pisgah Bisdac Church</h3><p class="editable-text" data-field="youtubeDesc">${escapeHtml(c.youtubeDesc)}</p><a href="#" class="btn-primary">Kunjungi Channel</a></div>
                    <div class="card"><i class="fas fa-dove"></i><h3 class="editable-text" data-field="faithTitle">${escapeHtml(c.faithTitle)}</h3><p class="editable-text" data-field="faithText">${escapeHtml(c.faithText)}</p></div>
                </div>
                <h2>INFO & KEGIATAN</h2>
                <div class="grid-3" id="ministriesGrid">${c.ministries.map(m => `<div class="card"><i class="${m.icon}"></i><h3 class="editable-ministry-title">${escapeHtml(m.title)}</h3><p class="editable-ministry-desc">${escapeHtml(m.desc)}</p></div>`).join('')}</div>
                <div class="grid-2">
                    <div class="card"><h3 class="editable-text" data-field="tenangTitle">TENANG KAMI</h3><p class="editable-text" data-field="tenangDesc">${escapeHtml(c.tenangDesc || 'Tempat membangun komunitas berdaya saing.')}</p></div>
                    <div class="location-block"><i class="fas fa-map-marker-alt"></i><h3>Pisgah Bisdac Church</h3><p class="editable-text" data-field="address">${escapeHtml(c.address)}<br>${escapeHtml(c.phone)}</p><hr><h4>WAKTU LAYANAN</h4><p class="editable-text" data-field="serviceHours">${c.serviceHours}</p></div>
                </div>
                <h2>KESAKSIAN</h2>
                <div class="testimony" id="testimonyList">${c.testimonies.map(t => `<p><i class="fas fa-check-circle"></i> "${escapeHtml(t)}"</p>`).join('')}</div>
                <h2>PERANYAAN UMUM</h2>
                <div class="grid-2" id="faqList">${c.faqs.map(f => `<div><strong>❓ ${escapeHtml(f.q)}</strong><p>${escapeHtml(f.a)}</p></div>`).join('')}</div>
                <div style="background:#e9dfce; border-radius:48px; padding:2rem; text-align:center; margin:2rem 0"><i class="fas fa-hand-holding-heart"></i><h3>KAMI DI SINI UNTUK ANDA</h3><p class="editable-text" data-field="footerMsg">Terhubung. Berdoa. Bertumbuh.</p><a href="#" class="btn-primary">Hubungi Kami</a></div>
            </div>
        `;
        if (editMode && isAdmin) enableEditing(true);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }

    function enableEditing(enable) {
        editMode = enable;
        document.querySelectorAll(".editable-text, .editable-schedule, .editable-ministry-title, .editable-ministry-desc").forEach(el => {
            if (enable) { el.setAttribute("contenteditable", "true"); el.classList.add("editable"); }
            else { el.removeAttribute("contenteditable"); el.classList.remove("editable"); }
        });
    }

    async function saveAll() {
        if (!isAdmin) return alert("Login dulu");
        // Kumpulkan data dari DOM
        let churchName = document.querySelector('[data-field="churchName"]')?.innerText || "";
        let tagline = document.querySelector('[data-field="tagline"]')?.innerText || "";
        let verse = document.querySelector('[data-field="verse"]')?.innerHTML || "";
        let promoText = document.querySelector('[data-field="promoText"]')?.innerText || "";
        let youtubeDesc = document.querySelector('[data-field="youtubeDesc"]')?.innerText || "";
        let faithTitle = document.querySelector('[data-field="faithTitle"]')?.innerText || "";
        let faithText = document.querySelector('[data-field="faithText"]')?.innerText || "";
        let address = document.querySelector('[data-field="address"]')?.innerText || "";
        let phone = document.querySelector('[data-field="phone"]')?.innerText || "";
        let serviceHours = document.querySelector('[data-field="serviceHours"]')?.innerHTML || "";
        let tenangDesc = document.querySelector('[data-field="tenangDesc"]')?.innerText || "";
        // schedule
        let scheduleRows = [...document.querySelectorAll("#scheduleBody tr")].map(tr => [...tr.querySelectorAll("td")].map(td => td.innerText));
        // ministries
        let ministries = [...document.querySelectorAll("#ministriesGrid .card")].map(card => ({
            icon: card.querySelector("i").className,
            title: card.querySelector(".editable-ministry-title").innerText,
            desc: card.querySelector(".editable-ministry-desc").innerText
        }));
        // testimonies (ambil dari elemen .testimony p)
        let testimonies = [...document.querySelectorAll("#testimonyList p")].map(p => p.innerText.replace(/^[^"]*"|"$/g, ''));
        // faqs (ambil dari .grid-2 > div)
        let faqs = [...document.querySelectorAll("#faqList > div")].map(div => ({
            q: div.querySelector("strong")?.innerText.replace("❓ ", "") || "",
            a: div.querySelector("p")?.innerText || ""
        }));

        const newData = {
            churchName, tagline, verse, promoText, youtubeDesc, faithTitle, faithText,
            address, phone, serviceHours, tenangDesc, schedule: scheduleRows, ministries, testimonies, faqs
        };
        const { error } = await supabase.from("site_content").update({ data: newData }).eq("id", 1);
        if (error) alert("Gagal simpan: " + error.message);
        else alert("Konten berhasil disimpan!");
    }

    document.getElementById("adminLoginBtn").onclick = promptLogin;
    document.getElementById("toggleEditBtn").onclick = () => { if(isAdmin) enableEditing(!editMode); else alert("Belum login"); };
    document.getElementById("saveBtn").onclick = saveAll;
    document.getElementById("logoutBtn").onclick = () => { isAdmin = false; editMode = false; document.getElementById("adminToolbar").style.display = "none"; document.getElementById("adminLoginBtn").style.display = "flex"; enableEditing(false); };
    loadContent();
</script>
</body>
</html>
